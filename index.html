<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <section id="heading">
      <nav></nav>
      <h2>Check out our Movie Collection</h2>
      <div class="header">
      <input name="search" placeholder="Type to Search" type="text" oninput="onSearchChange(event)">
      <select class="filter" name="filter" id="filter" onchange="filterMovies(event.target.value)">
        <option value="" disabled selected>Sort</option>
        <option value="NEW_TO_OLD">Most Recent</option>
        <option value="OLD_TO_NEW">Oldest to Latest</option>
        <option value="RATING_HIGH_TO_LOW">Rating, High to Low</option>
        <option value="RATING_LOW_TO_HIGH">Rating, Low to High</option>
      </select>
      </div>
    </section>
    <main>
    <section id="movies">
      <div class="movie-list">
      </div>
    </section>
    </main>
  </body>
</html>
