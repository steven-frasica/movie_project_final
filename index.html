<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script src="index.js" defer></script>
  </head>
  <body>
    <!-- Hero header: brand, search input, and sort control. -->
    <header class="hero">
      <h1>Theater6</h1>
      <h2>Choose Your Next Experience</h2>
      <div class="hero__controls">
        <div class="search-bar">
          <input
            id="search-input"
            name="search"
            placeholder="Type to Search"
            type="text"
            oninput="onSearchChange(event)"
          />
          <button
            class="search-bar__clear"
            type="button"
            onclick="clearSearchInput()"
            aria-label="Clear search"
          >
            &times;
          </button>
        </div>
        <select
          class="sort-select"
          name="sort"
          id="sort-select"
          onchange="sortMovies(event.target.value)"
        >
          <option value="" disabled selected>Sort</option>
          <option value="NEW_TO_OLD">Newest First</option>
          <option value="OLD_TO_NEW">Oldest First</option>
          <option value="RATING_HIGH_TO_LOW">Rating, High to Low</option>
          <option value="RATING_LOW_TO_HIGH">Rating, Low to High</option>
        </select>
      </div>
    </header>
    <main>
      <!-- JavaScript replaces this container with loading, empty, or movie-card states. -->
      <section id="movie-results" class="movie-results">
        <div class="movie-grid">
          <i class="fas fa-spinner movies__loading--spinner"></i>
        </div>
      </section>
    </main>
    <footer>
      <div class="footer__inner">
        <div class="footer__stack">
          <div>
            <figure class="footer__logo">
              <img class="footer__img" src="./assets/movie.png" alt="" />
            </figure>
          </div>
          <div class="footer__copyright">
            Copyright © 2026 Theater6 Steven Frasica
          </div>
          <a
            class="footer__attribution"
            href="https://www.flaticon.com/free-icons/movie"
            title="movie icons"
            target="_blank"
            >Movie icon created by Freepik - Flaticon</a
          >
        </div>
      </div>
    </footer>

    <!-- Modal dialog used to show the selected movie's expanded details. -->
    <div
      id="movie-details-modal"
      class="movie-details-modal"
      aria-hidden="true"
    >
      <div
        class="movie-details-modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="movie-details-modal-title"
      >
        <button
          class="movie-details-modal__close"
          type="button"
          onclick="closeMovieDetailsModal()"
          aria-label="Close modal"
        >
          &times;
        </button>
        <div class="movie-details-modal__content">
          <img
            id="movie-details-modal-poster"
            class="movie-details-modal__poster"
            src=""
            alt="Movie poster"
          />
          <div class="movie-details-modal__body">
            <h3 id="movie-details-modal-title"></h3>
            <!-- These placeholders are filled by JavaScript when a card is opened. -->
            <div
              id="movie-details-modal-meta"
              class="movie-details-modal__meta"
            ></div>
            <div
              id="movie-details-modal-runtime"
              class="movie-details-modal__runtime"
            ></div>
            <div
              id="movie-details-modal-cast"
              class="movie-details-modal__cast"
            ></div>
            <div
              id="movie-details-modal-text"
              class="movie-details-modal__text"
            ></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
