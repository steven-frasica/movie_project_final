<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <section id="heading">
      <nav></nav>
      <h2>Check out our Movie Collection</h2>
      <input type="text" onchange="onSearchChange(event)">
      <select name="" id="filter" onchange="filterMovies(event)">
        <option value="NEW_TO_OLD">Most Recent</option>
        <option value="OLD_TO_NEW">Oldest to Latest</option>
        <option value="RATING_HIGH_TO_LOW">Rating, High to Low</option>
        <option value="RATING_LOW_TO_HIGH">Rating, Low to High</option>
      </select>
    </section>
    <main>
    <section id="movies">
      <div class="movie-list">
        <div class="movie">
          <div class="movie-card--poster">
            <div class="movie-card__container">
              <figure>
                <img src="./assets/donnie_darko.webp" alt="">
              </figure>
            </div>
          </div>
          <div class="movie-card--info">
            <h3>Donnie Darko</h3>
              <p><b>Director:</b></p>
              <p><b>Release Year:</b></p>
              <p><b>Genre:</b><a href=""></a></p></div>
        </div>
      </div>
    </section>
    </main>
  </body>
</html>
