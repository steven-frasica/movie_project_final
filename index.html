<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script src="index.js" defer></script>
  </head>
  <body>
    <!-- Hero section: brand, search input, and sort control. -->
    <section id="heading">
      <h1>Theater6</h1>
      <h2>Choose Your Next Experience</h2>
      <div class="header">
        <div class="search-input-wrapper">
          <input
            id="search-input"
            name="search"
            placeholder="Type to Search"
            type="text"
            oninput="onSearchChange(event)"
          />
          <button
            class="search-clear-button"
            type="button"
            onclick="clearSearchInput()"
            aria-label="Clear search"
          >
            &times;
          </button>
        </div>
        <select
          class="filter"
          name="filter"
          id="filter"
          onchange="filterMovies(event.target.value)"
        >
          <option value="" disabled selected>Sort</option>
          <option value="NEW_TO_OLD">Newest First</option>
          <option value="OLD_TO_NEW">Oldest First</option>
          <option value="RATING_HIGH_TO_LOW">Rating, High to Low</option>
          <option value="RATING_LOW_TO_HIGH">Rating, Low to High</option>
        </select>
      </div>
    </section>
    <main>
      <!-- JavaScript replaces this container with loading, empty, or movie-card states. -->
      <section id="movies">
        <div class="movie-list">
          <i class="fas fa-spinner movies__loading--spinner"></i>
        </div>
      </section>
    </main>
    <footer>
      <div class="container">
        <div class="row row__column">
          <div>
            <figure class="footer__logo">
              <img class="footer__img" src="./assets/movie.png" alt="" />
            </figure>
          </div>
          <div class="footer__copyright">
            Copyright © 2026 Theater6 Steven Frasica
          </div>
          <a
            class="footer__attribution"
            href="https://www.flaticon.com/free-icons/movie"
            title="movie icons"
            target="_blank"
            >Movie icon created by Freepik - Flaticon</a
          >
        </div>
      </div>
    </footer>

    <!-- Modal dialog used to show the selected movie's expanded details. -->
    <div id="plot-modal" class="plot-modal" aria-hidden="true">
      <div
        class="plot-modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="plot-modal-title"
      >
        <button
          class="plot-modal__close"
          type="button"
          onclick="closePlotModal()"
          aria-label="Close modal"
        >
          &times;
        </button>
        <div class="plot-modal__content">
          <img
            id="plot-modal-poster"
            class="plot-modal__poster"
            src=""
            alt="Movie poster"
          />
          <div class="plot-modal__copy">
            <h3 id="plot-modal-title"></h3>
            <!-- These placeholders are filled by JavaScript when a card is opened. -->
            <p id="plot-modal-meta" class="plot-modal__meta"></p>
            <p id="plot-modal-runtime" class="plot-modal__runtime"></p>
            <p id="plot-modal-cast" class="plot-modal__cast"></p>
            <p id="plot-modal-text" class="plot-modal__text"></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
